<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <style>
    .cursor, .card, .summary, .preview, .pulse {
      animation-duration: 8s;
      animation-iteration-count: infinite;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(.2,.8,.2,1);
    }
    .cursor { animation-name: cursor; }
    @keyframes cursor {
      0%, 8%     { transform: translate(520px, 286px); }
      18%, 72%   { transform: translate(276px, 185px); }
      84%, 100%  { transform: translate(610px, 300px); }
    }
    .card { animation-name: card; transform-origin: 330px 210px; }
    @keyframes card {
      0%, 23%    { opacity: 0; transform: translateY(4px); }
      28%, 76%   { opacity: 1; transform: translateY(0); }
      82%, 100%  { opacity: 0; transform: translateY(3px); }
    }
    .preview { animation-name: preview; }
    @keyframes preview {
      0%, 27%    { opacity: 0; }
      32%, 46%   { opacity: 1; }
      52%, 100%  { opacity: 0; }
    }
    .summary { animation-name: summary; }
    @keyframes summary {
      0%, 48%    { opacity: 0; transform: translateY(3px); }
      54%, 76%   { opacity: 1; transform: translateY(0); }
      82%, 100%  { opacity: 0; transform: translateY(0); }
    }
    .pulse { animation-name: pulse; transform-origin: 276px 185px; }
    @keyframes pulse {
      0%, 16%, 78%, 100% { opacity: 0; transform: scale(.94); }
      18%, 72%           { opacity: .16; transform: scale(1); }
    }
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="720" height="320" rx="12" fill="#ffffff" stroke="#e4e7ec"/>
  <circle cx="48" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="68" cy="48" r="6" fill="#febc2e"/>
  <circle cx="88" cy="48" r="6" fill="#28c840"/>
  <rect x="120" y="38" width="300" height="20" rx="10" fill="#f3f4f6"/>
  <text x="136" y="52" font-size="11" fill="#8b929e">example.com/reading</text>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#24272d">
    <text x="70" y="104" font-size="24" font-weight="700">How attention leaks across tabs</text>
    <text x="70" y="148" font-size="17">A small distraction can become a new research thread.</text>
    <text x="70" y="181" font-size="17">The author points to a</text>
    <rect class="pulse" x="235" y="164" width="98" height="28" rx="5" fill="#2563eb"/>
    <text x="238" y="181" font-size="17" fill="#2563eb" text-decoration="underline">case study.</text>
    <text x="70" y="214" font-size="17">Opening it could pull you away from the essay.</text>
  </g>

  <g class="card" filter="url(#shadow)">
    <rect x="258" y="196" width="386" height="128" rx="9" fill="#ffffff" stroke="#d8dde5"/>
    <rect x="276" y="215" width="16" height="16" rx="4" fill="#111827"/>
    <text x="302" y="228" font-size="13" font-weight="650" fill="#111318">Product strategy teardown</text>
    <text x="302" y="249" font-size="12" fill="#5b6470">growth.design</text>
    <text class="preview" x="302" y="273" font-size="13" fill="#343a43">A case study on onboarding friction and drop-off.</text>
    <text class="summary" x="302" y="273" font-size="13" fill="#25334b">
      <tspan x="302" dy="0">verdict · Useful UX example,</tspan>
      <tspan x="302" dy="17">but safe to save for later.</tspan>
    </text>
  </g>

  <g class="cursor">
    <path transform="scale(.95)" fill="#1d1d1f" stroke="#fff" stroke-width="1.4"
          d="M0 0 L0 16.5 L3.8 13 L6.3 18.6 L8.9 17.4 L6.4 11.9 L11.5 11.6 Z"/>
  </g>
</svg>

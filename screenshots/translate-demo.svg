<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- Animated demo of inline_translate.js. Pure CSS keyframes — GitHub
       renders these inside README <img> tags, no scripts needed.
       Act 1 (0–30%): click the floating 译 button → bilingual whole-article mode.
       Act 2 (31–95%): select a word → 划词翻译 dictionary popup.
       Reactions are deliberately snappy (~0.2–0.4s) to match real,
       cached/streamed performance. -->
  <style>
    .cursor, .selbox, .selbtn, .fab-off, .fab-on, .pop, .popdots,
    .tr1, .tr2, .dots1, .dots2, .g1, .g2, .g3 {
      animation-duration: 12s;
      animation-iteration-count: infinite;
      animation-timing-function: ease;
      animation-fill-mode: both;
    }
    .cursor { animation-name: cursor; animation-timing-function: ease-in-out; }
    @keyframes cursor {
      0%, 2%    { transform: translate(380px, 330px); }
      6%, 30%   { transform: translate(688px, 222px); }
      35%       { transform: translate(93px, 130px); }
      41%       { transform: translate(193px, 130px); }
      44%, 49%  { transform: translate(208px, 158px); }
      54%, 100% { transform: translate(430px, 350px); }
    }
    .fab-off { animation-name: faboff; }
    @keyframes faboff {
      0%, 6.5% { opacity: 1; }
      7.5%, 96% { opacity: 0; }
      99%, 100% { opacity: 1; }
    }
    .fab-on {
      transform-box: fill-box;
      transform-origin: center;
      animation-name: fabon;
    }
    @keyframes fabon {
      0%, 6.5%  { opacity: 0; transform: scale(1); }
      7.5%      { opacity: 1; transform: scale(0.85); }
      9%        { opacity: 1; transform: scale(1); }
      96%       { opacity: 1; transform: scale(1); }
      99%, 100% { opacity: 0; transform: scale(1); }
    }
    .dots1 { animation-name: dots1; }
    @keyframes dots1 {
      0%, 8%     { opacity: 0; }
      8.5%, 9.5% { opacity: 0.55; }
      10.5%, 100% { opacity: 0; }
    }
    .dots2 { animation-name: dots2; }
    @keyframes dots2 {
      0%, 8%    { opacity: 0; }
      8.5%, 11% { opacity: 0.55; }
      12.5%, 100% { opacity: 0; }
    }
    .tr1 { animation-name: tr1; }
    @keyframes tr1 {
      0%, 9%   { opacity: 0; transform: translateY(5px); }
      11%, 95% { opacity: 1; transform: translateY(0); }
      98%, 100% { opacity: 0; transform: translateY(0); }
    }
    .tr2 { animation-name: tr2; }
    @keyframes tr2 {
      0%, 10.5%  { opacity: 0; transform: translateY(5px); }
      12.5%, 95% { opacity: 1; transform: translateY(0); }
      98%, 100% { opacity: 0; transform: translateY(0); }
    }
    .selbox {
      transform-box: fill-box;
      transform-origin: left center;
      animation-name: sel;
      animation-timing-function: ease-in-out;
    }
    @keyframes sel {
      0%, 35%  { transform: scaleX(0); }
      41%, 93% { transform: scaleX(1); }
      96%, 100% { transform: scaleX(0); }
    }
    .selbtn {
      transform-box: fill-box;
      transform-origin: center;
      animation-name: selbtn;
    }
    @keyframes selbtn {
      0%, 42%      { opacity: 0; transform: scale(0.6); }
      43.5%, 44.5% { opacity: 1; transform: scale(1); }
      45.5%        { opacity: 1; transform: scale(0.82); }
      46.5%        { opacity: 1; transform: scale(1); }
      48%, 100%    { opacity: 0; transform: scale(1); }
    }
    .pop { animation-name: pop; }
    @keyframes pop {
      0%, 46%    { opacity: 0; transform: translate(90px, 164px); }
      48.5%, 93% { opacity: 1; transform: translate(90px, 158px); }
      96%, 100%  { opacity: 0; transform: translate(90px, 158px); }
    }
    .popdots { animation-name: popdots; }
    @keyframes popdots {
      0%, 47%     { opacity: 0; }
      48.5%, 50%  { opacity: 0.55; }
      51.5%, 100% { opacity: 0; }
    }
    .g1 { animation-name: rise1; }
    .g2 { animation-name: rise2; }
    .g3 { animation-name: rise3; }
    @keyframes rise1 {
      0%, 50%  { opacity: 0; transform: translateY(5px); }
      52%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes rise2 {
      0%, 51.5%  { opacity: 0; transform: translateY(5px); }
      53.5%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes rise3 {
      0%, 53%  { opacity: 0; transform: translateY(5px); }
      55%, 100% { opacity: 1; transform: translateY(0); }
    }
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <filter id="fabshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- browser card -->
  <rect x="20" y="20" width="720" height="440" rx="12" fill="#ffffff" stroke="#e3e3e8"/>
  <circle cx="48" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="68" cy="48" r="6" fill="#febc2e"/>
  <circle cx="88" cy="48" r="6" fill="#28c840"/>
  <rect x="120" y="38" width="280" height="20" rx="10" fill="#f2f2f5"/>
  <text x="136" y="52" font-size="11" fill="#9a9aa0">example.com/some-article</text>

  <!-- article -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#2b2b2e">
    <text x="56" y="110">Some of the best discoveries in science happen by</text>
    <!-- selection highlight behind the word -->
    <rect class="selbox" x="94" y="122" width="98" height="23" rx="3" fill="#0a62ff" opacity="0.22"/>
    <text x="56" y="138">pure</text>
    <text x="97" y="138" textLength="92">serendipity</text>
    <text x="199" y="138">— a happy accident noticed by a</text>
    <text x="56" y="166">prepared mind.</text>

    <!-- paragraph 1 translation (bilingual mode) -->
    <text class="dots1" x="56" y="196" font-size="15" fill="#555">· · ·</text>
    <text class="tr1" x="56" y="196" font-size="15.5" fill="#3c3c40">科学史上一些最了不起的发现，都源于纯粹的机缘巧合——</text>
    <text class="tr1" x="56" y="222" font-size="15.5" fill="#3c3c40">有准备的头脑捕捉到的美丽意外。</text>

    <text x="56" y="266">Penicillin, X-rays, and the microwave oven were all</text>
    <text x="56" y="294">found this way.</text>

    <!-- paragraph 2 translation -->
    <text class="dots2" x="56" y="324" font-size="15" fill="#555">· · ·</text>
    <text class="tr2" x="56" y="324" font-size="15.5" fill="#3c3c40">青霉素、X 射线和微波炉，都是这样被发现的。</text>
  </g>

  <!-- floating 译 button (FAB), off → on -->
  <g class="fab-off" filter="url(#fabshadow)">
    <circle cx="702" cy="230" r="19" fill="#ffffff" stroke="#c9c9cf"/>
    <text x="702" y="236" font-size="15" fill="#555" text-anchor="middle">译</text>
  </g>
  <g class="fab-on" filter="url(#fabshadow)">
    <circle cx="702" cy="230" r="19" fill="#5c5cff"/>
    <text x="702" y="236" font-size="15" fill="#ffffff" text-anchor="middle">译</text>
  </g>

  <!-- selection 译 button -->
  <g class="selbtn">
    <rect x="201" y="148" width="27" height="27" rx="7" fill="#5c5cff"/>
    <text x="214.5" y="166.5" font-size="13" fill="#ffffff" text-anchor="middle">译</text>
  </g>

  <!-- dictionary popup (划词翻译) -->
  <g class="pop">
    <rect x="0" y="0" width="330" height="170" rx="12" fill="#ffffff" stroke="#e2e2e6" filter="url(#shadow)"/>
    <text class="popdots" x="20" y="36" font-size="15" fill="#555">· · ·</text>
    <g class="g1">
      <text x="20" y="38" font-size="19" font-weight="650" fill="#111">机缘巧合<tspan dx="9" font-size="12.5" font-weight="400" font-style="italic" fill="#8a8a8e">n. 名词</tspan></text>
    </g>
    <g class="g2">
      <text x="20" y="66" font-size="10" letter-spacing="1.5" fill="#9a9aa0" font-weight="600">释义</text>
      <text x="20" y="86" font-size="14" fill="#333">不经意间发现美好事物的运气；意外之喜</text>
    </g>
    <g class="g3">
      <text x="20" y="114" font-size="10" letter-spacing="1.5" fill="#9a9aa0" font-weight="600">例句</text>
      <text x="20" y="134" font-size="13.5" font-family="Georgia, serif" font-style="italic" fill="#444">Their meeting was pure serendipity.</text>
      <text x="20" y="152" font-size="12.5" fill="#777">他们的相遇纯属机缘巧合。</text>
    </g>
  </g>

  <!-- mouse cursor (drawn last, always on top) -->
  <g class="cursor">
    <path transform="scale(0.9)" fill="#1d1d1f" stroke="#fff" stroke-width="1.4"
          d="M0 0 L0 16.5 L3.8 13 L6.3 18.6 L8.9 17.4 L6.4 11.9 L11.5 11.6 Z"/>
  </g>
</svg>
